<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Online Banking Login</title>
    <style>
        /* Base Reset & Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Login Card Container */
        .login-container {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        /* Branding header */
        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand .logo-icon {
            font-size: 40px;
            color: #004080;
            margin-bottom: 10px;
        }

        .brand h2 {
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 600;
        }

        .brand p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            color: #333;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #004080;
            box-shadow: 0 0 0 3px rgba(0, 64, 128, 0.15);
        }

        /* Password Wrapper for Visibility Toggle */
        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            font-size: 13px;
            user-select: none;
        }

        /* Utilities */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            cursor: pointer;
        }

        .forgot-link {
            color: #004080;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #004080;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-submit:hover {
            background-color: #002d5a;
        }

        /* Security Banner */
        .security-notice {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
            font-size: 12px;
            color: #777;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .security-notice span {
            color: #2e7d32;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Bank Branding -->
        <div class="brand">
            <!-- Simulated Logo Icon -->
            <div class="logo-icon">&#127963;</div> 
            <h2>Apex Secure Bank</h2>
            <p>Online Banking Portal</p>
        </div>

        <!-- Login Form -->
        <form action="#" method="POST" autocomplete="off">
            
            <!-- User ID / Username -->
            <div class="form-group">
                <label for="username">User ID / Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required 
                    placeholder="Enter your online banking ID"
                    minlength="4"
                >
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        placeholder="Enter your password"
                    >
                    <span class="toggle-password" id="togglePassword">Show</span>
                </div>
            </div>

            <!-- Options -->
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember"> Remember ID
                </label>
                <a href="#" class="forgot-link">Forgot ID/Password?</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-submit">Secure Log In</button>

        </form>

        <!-- Security Footer Badge -->
        <div class="security-notice">
            &#128274; <span>256-bit SSL Encrypted</span> connection.
        </div>
    </div>

    <!-- JavaScript to toggle password visibility -->
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            // Toggle the type attribute
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            
            // Toggle the text
            this.textContent = type === 'password' ? 'Show' : 'Hide';
        });
    </script>

</body>
</html>
